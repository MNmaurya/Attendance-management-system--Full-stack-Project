{% extends "base.html" %}
{% block content %}

<style>
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    margin-top: 20px;
}
h2 { color:#1e3a8a; margin-bottom:20px; }
select, input[type="date"] {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}
button {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
button:hover { background:#1e40af; }
table { width:100%; margin-top:15px; border-collapse:collapse; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background:#2563eb; color:white; }
</style>

<div class="card">
    <h2>📋 Bulk Attendance</h2>

    <form method="POST">

        <label>Select Class</label><br>
        <select name="class" required>
            {% for c in classes %}
                <option value="{{ c.class }}">{{ c.class }}</option>
            {% endfor %}
        </select><br>

        <label>Select Subject</label><br>
        <select name="subject_id" required>
            {% for s in subjects %}
                <option value="{{ s.subject_id }}">{{ s.subject_name }}</option>
            {% endfor %}
        </select><br>

        <label>Select Date</label><br>
        <input type="date" name="date" required><br>

        <button type="submit" name="load_students">Load Students</button>
    </form>

    {% if students %}
    <form method="POST">
        <input type="hidden" name="class" value="{{ selected_class }}">
        <input type="hidden" name="subject_id" value="{{ subject_id }}">
        <input type="hidden" name="date" value="{{ date }}">

        <table>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Present</th>
                <th>Absent</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.roll_no }}</td>
                <td><input type="radio" name="status_{{ student.student_id }}" value="P" required></td>
                <td><input type="radio" name="status_{{ student.student_id }}" value="A"></td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <button type="submit" name="save_attendance">Save Attendance</button>
    </form>
    {% endif %}
</div>

{% endblock %}
